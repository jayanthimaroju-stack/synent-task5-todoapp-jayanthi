<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #23232e;
      --border: #2e2e3d;
      --accent: #7c5cfc;
      --accent-light: #9d82fd;
      --accent-glow: rgba(124, 92, 252, 0.25);
      --text: #e8e8f0;
      --text-muted: #7a7a99;
      --done-color: #3ddc97;
      --delete-color: #ff5c6a;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent-light), var(--done-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    /* Stats Bar */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 20px;
      text-align: center;
    }
    .stat-number {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-light);
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* Main Card */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* Input Area */
    .input-area {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .task-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .task-input::placeholder { color: var(--text-muted); }
    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s;
    }
    .add-btn:hover { background: var(--accent-light); }
    .add-btn:active { transform: scale(0.97); }

    /* Filter Tabs */
    .filters {
      display: flex;
      padding: 12px 20px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      padding: 5px 14px;
      font-size: 0.82rem;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent-light);
    }
    .filter-btn:hover:not(.active) {
      border-color: var(--text-muted);
      color: var(--text);
    }

    /* Task List */
    .task-list {
      list-style: none;
      min-height: 100px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.2s ease;
      transition: background 0.15s;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface2); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox */
    .check-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      padding: 0;
    }
    .check-btn:hover { border-color: var(--done-color); }
    .check-btn.done {
      background: var(--done-color);
      border-color: var(--done-color);
    }
    .check-icon { display: none; color: #0f0f13; font-size: 13px; font-weight: 700; }
    .check-btn.done .check-icon { display: block; }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      transition: all 0.2s;
      word-break: break-word;
    }
    .task-text.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.2s;
      opacity: 0;
      flex-shrink: 0;
    }
    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--delete-color); background: rgba(255,92,106,0.12); }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
      display: none;
    }
    .empty-state.show { display: block; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-text { font-size: 0.95rem; }

    /* Footer */
    .card-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-count {
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .clear-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: var(--font-body);
      transition: color 0.2s;
    }
    .clear-btn:hover { color: var(--delete-color); }

    @media (max-width: 480px) {
      .logo { font-size: 1.8rem; }
      .stats { gap: 10px; }
      .stat { padding: 8px 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">TaskFlow</div>
  <p class="tagline">Your tasks, beautifully organized</p>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-number" id="totalCount">0</div>
    <div class="stat-label">Total</div>
  </div>
  <div class="stat">
    <div class="stat-number" id="pendingCount">0</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat">
    <div class="stat-number" id="doneCount">0</div>
    <div class="stat-label">Done</div>
  </div>
</div>

<div class="card">
  <div class="input-area">
    <input class="task-input" id="taskInput" type="text" placeholder="Add a new task…" maxlength="120" autocomplete="off"/>
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
  </div>

  <ul class="task-list" id="taskList"></ul>
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">✅</div>
    <div class="empty-text">No tasks here. Add one above!</div>
  </div>

  <div class="card-footer">
    <span class="footer-count" id="footerCount">0 tasks remaining</span>
    <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow-tasks') || '[]');
  let currentFilter = 'all';

  function save() {
    localStorage.setItem('taskflow-tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id: Date.now(), text, done: false });
    save();
    input.value = '';
    render();
    input.focus();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    save();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');
    const filtered = tasks.filter(t => {
      if (currentFilter === 'pending') return !t.done;
      if (currentFilter === 'done') return t.done;
      return true;
    });

    list.innerHTML = '';
    if (filtered.length === 0) {
      empty.classList.add('show');
      const msgs = { all: '✨ All clear! Add your first task.', pending: '🎉 No pending tasks!', done: '📝 No completed tasks yet.' };
      empty.querySelector('.empty-text').textContent = msgs[currentFilter];
    } else {
      empty.classList.remove('show');
      filtered.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item';
        li.innerHTML = `
          <button class="check-btn ${t.done ? 'done' : ''}" onclick="toggleTask(${t.id})" title="Mark complete">
            <span class="check-icon">✓</span>
          </button>
          <span class="task-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete task">✕</button>
        `;
        list.appendChild(li);
      });
    }

    const pending = tasks.filter(t => !t.done).length;
    const done = tasks.filter(t => t.done).length;
    document.getElementById('totalCount').textContent = tasks.length;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('footerCount').textContent = `${pending} task${pending !== 1 ? 's' : ''} remaining`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
